<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAVSI | Cyberpunk Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --void-black: #0a0a0a;
            --mint-accent: #00ff9f;
            --mint-glow: 0 0 10px rgba(0, 255, 159, 0.5);
        }
        body {
            background-color: var(--void-black);
            color: var(--mint-accent);
            font-family: 'JetBrains Mono', monospace;
            overflow-x: hidden;
        }
        .crt::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 118, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
        .tab-active {
            border-bottom: 2px solid var(--mint-accent);
            text-shadow: var(--mint-glow);
        }
        .panel {
            border: 1px solid rgba(0, 255, 159, 0.3);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }
        .glow-text { text-shadow: var(--mint-glow); }
        .glow-border { border-color: var(--mint-accent); box-shadow: var(--mint-glow); }
    </style>
</head>
<body class="crt p-4 md:p-8">
    <div id="root"></div>

    <script type="module">
        import React, { useState, useEffect } from 'https://esm.sh/react@18.2.0';
        import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';

        const App = () => {
            const [activeTab, setActiveTab] = useState('Dashboard');
            const [health, setHealth] = useState({ status: 'OFFLINE', provider: 'None' });
            const [bridge, setBridge] = useState({ online: false, device: 'Pixel 6a' });

            useEffect(() => {
                fetch('/api/health').then(res => res.json()).then(setHealth).catch(console.error);
                fetch('/api/bridge/status').then(res => res.json()).then(setBridge).catch(console.error);
                
                const interval = setInterval(() => {
                    fetch('/api/bridge/status').then(res => res.json()).then(setBridge);
                }, 5000);
                return () => clearInterval(interval);
            }, []);

            const tabs = ['Dashboard', 'SOMA', 'IRIS', 'GROUND', 'DAEMON', 'Self', 'Settings'];

            return React.createElement('div', { className: 'max-w-6xl mx-auto' }, [
                React.createElement('header', { className: 'flex justify-between items-center mb-8 border-b border-gray-800 pb-4' }, [
                    React.createElement('h1', { className: 'text-2xl font-bold glow-text' }, 'DAVSI // CORTEX'),
                    React.createElement('div', { className: 'flex gap-4' }, [
                        React.createElement('span', { className: `px-2 py-1 text-xs border ${health.status === 'online' ? 'border-green-500 text-green-500' : 'border-red-500 text-red-500'}` }, 
                            `CORTEX: ${health.status}`),
                        React.createElement('span', { className: `px-2 py-1 text-xs border ${bridge.online ? 'border-green-500 text-green-500' : 'border-red-500 text-red-500'}` }, 
                            `BRIDGE: ${bridge.online ? 'ONLINE' : 'OFFLINE'}`)
                    ])
                ]),
                React.createElement('nav', { className: 'flex gap-6 mb-8 overflow-x-auto pb-2' }, 
                    tabs.map(tab => React.createElement('button', {
                        key: tab,
                        onClick: () => setActiveTab(tab),
                        className: `uppercase tracking-widest text-sm pb-1 ${activeTab === tab ? 'tab-active' : 'opacity-50 hover:opacity-100'}`
                    }, tab))
                ),
                React.createElement('main', { className: 'panel p-6 min-h-[400px]' }, [
                    activeTab === 'Dashboard' && React.createElement(DashboardView, { health, bridge }),
                    activeTab === 'SOMA' && React.createElement(SomaView),
                    activeTab === 'IRIS' && React.createElement(IrisView),
                    activeTab === 'GROUND' && React.createElement(GroundView),
                    activeTab === 'DAEMON' && React.createElement(DaemonView),
                    activeTab === 'Self' && React.createElement(SelfView),
                    activeTab === 'Settings' && React.createElement(SettingsView, { bridge })
                ])
            ]);
        };

        const DashboardView = ({ health, bridge }) => React.createElement('div', null, [
            React.createElement('h2', { className: 'text-xl mb-4' }, '> SYSTEM_OVERVIEW'),
            React.createElement('div', { className: 'grid grid-cols-1 md:grid-cols-3 gap-4' }, [
                React.createElement('div', { className: 'border border-gray-700 p-4' }, [
                    React.createElement('div', { className: 'text-xs opacity-50 mb-1' }, 'ACTIVE_PROVIDER'),
                    React.createElement('div', { className: 'text-lg text-white' }, health.provider)
                ]),
                React.createElement('div', { className: 'border border-gray-700 p-4' }, [
                    React.createElement('div', { className: 'text-xs opacity-50 mb-1' }, 'BRIDGE_DEVICE'),
                    React.createElement('div', { className: 'text-lg text-white' }, bridge.device)
                ]),
                React.createElement('div', { className: 'border border-gray-700 p-4' }, [
                    React.createElement('div', { className: 'text-xs opacity-50 mb-1' }, 'UPTIME'),
                    React.createElement('div', { className: 'text-lg text-white' }, '99.9%')
                ])
            ])
        ]);

        const SomaView = () => {
            const [blocks, setBlocks] = useState([]);
            useEffect(() => {
                fetch('/api/soma/verify').then(res => res.json()).then(data => setBlocks(data.blocks));
            }, []);
            return React.createElement('div', null, [
                React.createElement('h2', { className: 'text-xl mb-4' }, '> SOMA_BLOCKCHAIN_MEMORY'),
                React.createElement('div', { className: 'space-y-2' }, blocks.map(b => 
                    React.createElement('div', { key: b.index, className: 'text-xs font-mono border-l-2 border-mint-accent pl-4 py-1' }, 
                        `[${new Date(b.timestamp).toLocaleTimeString()}] BLOCK#${b.index} HASH:${b.hash.substring(0,8)}... DATA:${b.data}`)
                ))
            ]);
        };

        const IrisView = () => {
            const profiles = ['REFLEX', 'FAST', 'SHARP', 'GENTLE', 'BALANCED', 'DEEP'];
            const [selected, setSelected] = useState('BALANCED');
            const [prompt, setPrompt] = useState('');
            const [response, setResponse] = useState('');

            const route = () => {
                fetch('/api/iris/route', {
                    method: 'POST',
                    body: JSON.stringify({ profile: selected, prompt })
                }).then(res => res.json()).then(data => setResponse(data.response));
            };

            return React.createElement('div', null, [
                React.createElement('h2', { className: 'text-xl mb-4' }, '> IRIS_ROUTING_PROFILES'),
                React.createElement('div', { className: 'flex flex-wrap gap-2 mb-4' }, profiles.map(p => 
                    React.createElement('button', {
                        key: p,
                        onClick: () => setSelected(p),
                        className: `px-3 py-1 text-xs border ${selected === p ? 'bg-mint-accent text-black' : 'border-mint-accent opacity-50'}`
                    }, p)
                )),
                React.createElement('textarea', {
                    className: 'w-full bg-black border border-gray-700 p-2 text-sm mb-2 outline-none focus:border-mint-accent',
                    rows: 3,
                    placeholder: 'Enter prompt...',
                    value: prompt,
                    onChange: (e) => setPrompt(e.target.value)
                }),
                React.createElement('button', { onClick: route, className: 'px-4 py-2 border border-mint-accent text-sm hover:bg-mint-accent hover:text-black transition' }, 'EXECUTE_ROUTE'),
                response && React.createElement('div', { className: 'mt-4 p-4 border border-gray-800 text-sm italic' }, response)
            ]);
        };

        const GroundView = () => React.createElement('div', null, [
            React.createElement('h2', { className: 'text-xl mb-4' }, '> GROUND_PERCEPTION'),
            React.createElement('div', { className: 'opacity-50 text-sm' }, 'Waiting for next perception cycle (60s interval)...'),
            React.createElement('div', { className: 'mt-4 h-32 border border-dashed border-gray-700 flex items-center justify-center text-xs' }, 'MOCK_PERCEPTION_STREAM')
        ]);

        const DaemonView = () => {
            const [logs, setLogs] = useState([]);
            useEffect(() => {
                const tick = () => fetch('/api/daemon/tick').then(res => res.json()).then(log => setLogs(prev => [log, ...prev].slice(0, 10)));
                tick();
                const interval = setInterval(tick, 8000); // Speed up for demo
                return () => clearInterval(interval);
            }, []);
            return React.createElement('div', null, [
                React.createElement('h2', { className: 'text-xl mb-4' }, '> DAEMON_INNER_MONOLOGUE'),
                React.createElement('div', { className: 'space-y-2' }, logs.map((l, i) => 
                    React.createElement('div', { key: i, className: 'text-xs font-mono text-gray-400' }, 
                        `[${new Date(l.timestamp).toLocaleTimeString()}] ${l.message}`)
                ))
            ]);
        };

        const SelfView = () => {
            const [diff, setDiff] = useState(null);
            const propose = () => fetch('/api/self/propose').then(res => res.json()).then(setDiff);
            return React.createElement('div', null, [
                React.createElement('h2', { className: 'text-xl mb-4' }, '> SELF_MODIFICATION'),
                React.createElement('button', { onClick: propose, className: 'px-4 py-2 border border-mint-accent text-sm' }, 'PROPOSE_MODIFICATION'),
                diff && React.createElement('pre', { className: 'mt-4 p-4 bg-black border border-gray-800 text-xs overflow-x-auto' }, diff.diff)
            ]);
        };

        const SettingsView = ({ bridge }) => React.createElement('div', null, [
            React.createElement('h2', { className: 'text-xl mb-4' }, '> SYSTEM_SETTINGS'),
            React.createElement('div', { className: 'space-y-6' }, [
                React.createElement('section', null, [
                    React.createElement('h3', { className: 'text-sm mb-2 opacity-50' }, 'LLM_PROVIDERS'),
                    React.createElement('div', { className: 'grid grid-cols-2 md:grid-cols-3 gap-2' }, [
                        'Emergent Universal', 'Ollama', 'NVIDIA NIM', 'Groq', 'OpenAI', 'OpenRouter'
                    ].map(p => React.createElement('div', { key: p, className: `p-2 border text-xs ${p === 'Emergent Universal' ? 'border-mint-accent glow-border' : 'border-gray-800 opacity-50'}` }, p)))
                ]),
                React.createElement('section', null, [
                    React.createElement('h3', { className: 'text-sm mb-2 opacity-50' }, 'BRIDGE_CONFIG'),
                    React.createElement('div', { className: 'text-xs space-y-1' }, [
                        React.createElement('div', null, `DEVICE: ${bridge.device}`),
                        React.createElement('div', null, `ACCESSIBILITY: ${bridge.accessibility}`),
                        React.createElement('div', null, `TERMUX: ${bridge.termux}`),
                        React.createElement('div', null, `LAST_HEARTBEAT: ${bridge.lastHeartbeat || 'NEVER'}`)
                    ])
                ])
            ])
        ]);

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
